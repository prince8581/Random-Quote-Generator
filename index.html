<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daily Inspiration | Random Quote Generator</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <!-- FontAwesome for Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="./css/style.css">
</head>
<body>
    <div class="background-blobs">
        <div class="blob shape-1"></div>
        <div class="blob shape-2"></div>
        <div class="blob shape-3"></div>
    </div>
    
    <div class="container">
        <div class="quote-card">
            <div class="card-header">
                <span class="badge"><i class="fa-solid fa-sparkles"></i> Inspiration</span>
            </div>
            <div class="quote-content">
                <i class="fa-solid fa-quote-left quote-icon"></i>
                <h1 class="quote-text">Honesty is the best policy.</h1>
                <i class="fa-solid fa-quote-right quote-icon-right"></i>
            </div>
            
            <div class="card-footer" style="justify-content: center;">
                <button class="primary-btn">
                    <span>New Quote</span>
                    <i class="fa-solid fa-arrow-right"></i>
                </button>
            </div>
        </div>
    </div>
    
    <script src="./js/script.js"></script>
</body>
</html>
